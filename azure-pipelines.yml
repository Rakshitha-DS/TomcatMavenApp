trigger:
- master

pool:
  vmImage: ubuntu-latest

stages:
- stage: Build
  jobs:
  - job: Build
    steps:
    - task: Maven@4
      inputs:
        mavenPomFile: pom.xml
        goals: clean package

- stage: Deploy
  dependsOn: Build
  jobs:
  - job: Deploy
    steps:
    - script: echo "Deployment Successful"

- stage: Verification
  dependsOn: Deploy
  jobs:
  - job: Verify
    steps:
    - script: echo "Verification Successful"